name: Supabase keepalive

# 防止 Supabase Free Plan 闲置 7 天自动暂停。
# 每 3 天对数据库做一次轻量查询，刷新活动时间戳。
#
# 配置方式（一次性）：
#   1. 在 GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#   2. Name:  SUPABASE_ANON_KEY
#      Value: 复制 .env.local 里 NEXT_PUBLIC_SUPABASE_ANON_KEY 的值
#   3. 之后这个 workflow 会自动按 cron 触发；也可以在 Actions 页签点 "Run workflow" 手动测试

on:
  schedule:
    # 每 3 天 UTC 02:30 跑一次（北京时间 10:30）
    - cron: '30 2 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: https://oedgpvfcxffopozjtqoj.supabase.co
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$ANON_KEY" ]; then
            echo "::error::secret SUPABASE_ANON_KEY 没配置"
            exit 1
          fi

          status=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY" \
            "$SUPABASE_URL/rest/v1/app_users?select=id&limit=1")

          echo "HTTP $status"
          echo "Body: $(cat /tmp/body)"

          if [ "$status" != "200" ]; then
            echo "::error::Supabase ping 失败：HTTP $status"
            exit 1
          fi

          echo "::notice::Supabase 已唤醒"
